<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>opencode-janitor dashboard</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
      crossorigin="anonymous"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --canvas: #0e0d0c;
        --base: #161514;
        --surface: #1e1d1b;
        --raised: #282624;
        --border: #353230;
        --border-subtle: #2a2826;
        --text-primary: #e6e1db;
        --text-secondary: #9c9690;
        --text-tertiary: #6b635c;
        --accent: #d49b54;
        --accent-hover: #e0ad6a;
        --ok: #5baf6c;
        --warn: #d49b54;
        --error: #e86a6a;
        --p0: #e05252;
        --p1: #d98b3d;
        --p2: #c9a644;
        --p3: #4a9a8f;
        --scroll-track: #141312;
        --scroll-thumb: #373330;
        --scroll-thumb-hover: #4a4540;
        --scroll-thumb-active: #5a5450;
        --window-height: calc(100vh - 128px);
      }

      * {
        box-sizing: border-box;
      }

      :focus {
        outline: none;
      }

      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(
            1200px 600px at 90% -10%,
            rgba(212, 155, 84, 0.1),
            transparent 65%
          ),
          var(--canvas);
        color: var(--text-primary);
        font-family: 'Space Grotesk', sans-serif;
      }

      #app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .list-scroll,
      .detail-scroll,
      .activity-scroll,
      .repos-scroll,
      .transcript {
        scrollbar-width: thin;
        scrollbar-color: var(--scroll-thumb) var(--scroll-track);
      }

      .list-scroll::-webkit-scrollbar,
      .detail-scroll::-webkit-scrollbar,
      .activity-scroll::-webkit-scrollbar,
      .repos-scroll::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      .list-scroll::-webkit-scrollbar-track,
      .detail-scroll::-webkit-scrollbar-track,
      .activity-scroll::-webkit-scrollbar-track,
      .repos-scroll::-webkit-scrollbar-track {
        background: var(--scroll-track);
      }

      .list-scroll::-webkit-scrollbar-thumb,
      .detail-scroll::-webkit-scrollbar-thumb,
      .activity-scroll::-webkit-scrollbar-thumb,
      .repos-scroll::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 999px;
        border: 2px solid var(--scroll-track);
      }

      .list-scroll::-webkit-scrollbar-thumb:hover,
      .detail-scroll::-webkit-scrollbar-thumb:hover,
      .activity-scroll::-webkit-scrollbar-thumb:hover,
      .repos-scroll::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }

      .list-scroll::-webkit-scrollbar-thumb:active,
      .detail-scroll::-webkit-scrollbar-thumb:active,
      .activity-scroll::-webkit-scrollbar-thumb:active,
      .repos-scroll::-webkit-scrollbar-thumb:active {
        background: var(--scroll-thumb-active);
      }

      .list-scroll::-webkit-scrollbar-corner,
      .detail-scroll::-webkit-scrollbar-corner,
      .activity-scroll::-webkit-scrollbar-corner,
      .repos-scroll::-webkit-scrollbar-corner {
        background: var(--scroll-track);
      }

      .transcript::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      .transcript::-webkit-scrollbar-track {
        background: #11100f;
      }

      .transcript::-webkit-scrollbar-thumb {
        background: #58504a;
        border-radius: 999px;
      }

      .transcript::-webkit-scrollbar-thumb:hover {
        background: #6d6258;
      }

      .header {
        height: 52px;
        border-bottom: 1px solid var(--border);
        background: rgba(22, 21, 20, 0.92);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
      }

      .brand {
        display: flex;
        gap: 10px;
        align-items: center;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.02em;
      }

      .header-left {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .repo-select {
        position: relative;
      }

      .repo-pill {
        border: 1px solid var(--border);
        background: #1a1816;
        color: var(--text-primary);
        border-radius: 7px;
        font: 500 12px/1.2 'JetBrains Mono', monospace;
        padding: 7px 10px;
        cursor: pointer;
        max-width: 360px;
        min-width: 220px;
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .repo-pill:hover,
      .repo-pill[aria-expanded='true'] {
        border-color: var(--accent);
        background: #211e1a;
      }

      .repo-pill-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .repo-chevron {
        color: var(--text-secondary);
        font-size: 10px;
        transition: transform 0.2s ease;
      }

      .repo-pill[aria-expanded='true'] .repo-chevron {
        transform: rotate(180deg);
      }

      .repo-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        width: 360px;
        border: 1px solid var(--border);
        border-radius: 9px;
        background: #151311;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.5);
        z-index: 100;
        overflow: hidden;
      }

      .repo-search {
        width: 100%;
        border: 0;
        border-bottom: 1px solid var(--border-subtle);
        background: #110f0d;
        color: var(--text-primary);
        font: 400 12px/1.2 'JetBrains Mono', monospace;
        padding: 10px 11px;
      }

      .repo-search::placeholder {
        color: var(--text-tertiary);
      }

      .repo-options {
        max-height: 260px;
        overflow: auto;
      }

      .repo-option {
        width: 100%;
        border: 0;
        border-top: 1px solid var(--border-subtle);
        background: transparent;
        color: var(--text-secondary);
        text-align: left;
        font: 500 12px/1.2 'Space Grotesk', sans-serif;
        padding: 10px 11px;
        cursor: pointer;
      }

      .repo-option:hover,
      .repo-option.active {
        background: #211d1a;
        color: var(--text-primary);
      }

      .repo-option .path {
        color: var(--text-primary);
        display: block;
      }

      .repo-option .meta {
        font: 400 11px/1.2 'JetBrains Mono', monospace;
        color: var(--text-tertiary);
        margin-top: 3px;
      }

      .repo-empty {
        padding: 14px 11px;
        color: var(--text-tertiary);
        font: 500 12px/1.2 'Space Grotesk', sans-serif;
      }

      .brand-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 16px rgba(212, 155, 84, 0.8);
      }

      .stats {
        display: flex;
        gap: 16px;
        align-items: center;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .stat-value {
        color: var(--text-primary);
        font-family: 'JetBrains Mono', monospace;
      }

      .stream {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 10px;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 11px;
        letter-spacing: 0.1em;
        font-family: 'JetBrains Mono', monospace;
      }

      .stream-live .stream-dot {
        background: var(--ok);
      }

      .stream-error .stream-dot {
        background: var(--error);
      }

      .stream-connecting .stream-dot,
      .stream-stale .stream-dot {
        background: var(--warn);
      }

      .stream-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
      }

      .tabs {
        height: 44px;
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        gap: 8px;
        padding: 0 16px;
        align-items: end;
      }

      .tab {
        border: 0;
        background: transparent;
        color: var(--text-secondary);
        font: 500 12px/1 'Space Grotesk', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 12px 12px 11px;
        border-bottom: 2px solid transparent;
        cursor: pointer;
        transition: color 0.15s ease, border-color 0.2s ease;
      }

      .tab:hover {
        color: var(--text-primary);
      }

      .tab.active {
        color: var(--text-primary);
        border-bottom-color: var(--accent);
      }

      .content {
        flex: 1;
        padding: 14px;
      }

      .panel {
        border: 1px solid var(--border);
        background: var(--base);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(0, 0, 0, 0.06);
      }

      .reports-layout {
        display: grid;
        grid-template-columns: 360px minmax(420px, 1fr);
        gap: 12px;
        height: calc(var(--window-height) - 88px);
      }

      .reports-meta {
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(22, 21, 20, 0.7);
        margin-bottom: 10px;
        padding: 11px 12px;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
      }

      .meta-item {
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px 9px;
        background: rgba(30, 29, 27, 0.55);
      }

      .meta-item .label {
        color: var(--text-tertiary);
        font: 500 10px/1.1 'Space Grotesk', sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .meta-item .value {
        color: var(--text-primary);
        margin-top: 6px;
        font: 500 12px/1.2 'JetBrains Mono', monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .reports-layout > .panel {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .panel.repos-window,
      .panel.activity-window {
        height: var(--window-height);
        display: flex;
        flex-direction: column;
      }

      .list-scroll,
      .detail-scroll,
      .activity-scroll,
      .repos-scroll {
        overflow: auto;
        max-height: none;
        flex: 1;
        min-height: 0;
      }

      .list-item {
        border-bottom: 1px solid var(--border-subtle);
        padding: 8px 10px;
        cursor: pointer;
        transition: background 0.12s ease, padding-left 0.12s ease, border-left-width 0.12s ease;
      }

      .list-item:hover {
        background: var(--raised);
      }

      .list-item.active {
        background: rgba(212, 155, 84, 0.14);
        border-left: 3px solid var(--accent);
        padding-left: 7px;
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .mono {
        font-family: 'JetBrains Mono', monospace;
      }

      .muted {
        color: var(--text-secondary);
      }

      .subtle {
        color: var(--text-tertiary);
      }

      .badge {
        border-radius: 999px;
        font-size: 10px;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        text-transform: uppercase;
        border: 1px solid transparent;
      }

      .severity {
        display: inline-flex;
        gap: 3px;
      }

      .sev-dot {
        width: 6px;
        height: 6px;
        border-radius: 2px;
      }

      .detail-head {
        border-bottom: 1px solid var(--border-subtle);
        padding: 10px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .detail-scroll {
        font-size: 11px;
      }

      .detail-actions {
        display: inline-flex;
        gap: 8px;
      }

      button.btn {
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-primary);
        border-radius: 7px;
        font: 500 12px/1.2 'Space Grotesk', sans-serif;
        padding: 7px 10px;
        cursor: pointer;
        transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      }

      button.btn:hover {
        border-color: var(--accent);
        background: var(--raised);
      }

      button.btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      button.btn-danger {
        border-color: rgba(232, 106, 106, 0.45);
        color: #f0b2b2;
      }

      button.btn-danger:hover {
        border-color: rgba(232, 106, 106, 0.8);
        background: rgba(232, 106, 106, 0.12);
      }

      .find-card {
        border: 1px solid var(--border);
        border-left-width: 3px;
        border-radius: 8px;
        background: var(--surface);
        margin: 8px 10px;
        padding: 8px 10px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      .transcript {
        margin: 8px 10px;
        background: var(--canvas);
        border: 1px solid var(--border-subtle);
        border-radius: 8px;
        padding: 8px;
        white-space: pre-wrap;
        font: 400 11px/1.4 'JetBrains Mono', monospace;
      }

      .repos-table {
        width: 100%;
        border-collapse: collapse;
      }

      .repos-table th,
      .repos-table td {
        border-bottom: 1px solid var(--border-subtle);
        padding: 10px 12px;
        text-align: left;
        font-size: 12px;
      }

      .repos-table th {
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 11px;
      }

      .activity-line {
        border-bottom: 1px solid var(--border-subtle);
        padding: 7px 10px;
        font: 400 12px/1.4 'JetBrains Mono', monospace;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border-subtle);
        padding: 10px 12px;
      }

      .flash {
        position: fixed;
        right: 16px;
        top: 16px;
        z-index: 50;
        background: rgba(40, 38, 36, 0.92);
        backdrop-filter: blur(8px);
        border: 1px solid var(--border);
        border-left: 3px solid var(--accent);
        color: var(--text-primary);
        padding: 10px 12px;
        border-radius: 8px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
        animation: flash-in 0.28s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: rgba(14, 13, 12, 0.7);
        backdrop-filter: blur(4px);
        display: grid;
        place-items: center;
        animation: overlay-in 0.2s ease;
      }

      .modal {
        width: min(420px, calc(100vw - 24px));
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--surface);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(0, 0, 0, 0.1);
        animation: modal-in 0.22s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .modal button {
        width: 100%;
        text-align: left;
        border: 0;
        border-top: 1px solid var(--border-subtle);
        background: transparent;
        color: var(--text-primary);
        padding: 11px 12px;
        cursor: pointer;
        transition: background 0.12s ease;
      }

      .modal button:hover {
        background: var(--raised);
      }

      @media (max-width: 980px) {
        .reports-layout {
          grid-template-columns: 1fr;
          height: auto;
        }

        .list-scroll,
        .detail-scroll,
        .activity-scroll,
        .repos-scroll {
          max-height: unset;
        }

        .stats {
          display: none;
        }

        .repo-pill {
          min-width: 170px;
          max-width: 240px;
        }

        .repo-dropdown {
          width: min(92vw, 340px);
        }

        .meta-grid {
          grid-template-columns: 1fr 1fr;
        }

        .panel.repos-window,
        .panel.activity-window {
          height: auto;
          min-height: var(--window-height);
        }
      }

      /* ── Scrollbars: WebKit (Chrome/Safari/Edge) ── */
      .list-scroll,
      .detail-scroll,
      .activity-scroll,
      .repos-scroll {
        scrollbar-width: thin;
        scrollbar-color: var(--scroll-thumb) var(--scroll-track);
      }

      .list-scroll::-webkit-scrollbar,
      .detail-scroll::-webkit-scrollbar,
      .activity-scroll::-webkit-scrollbar,
      .repos-scroll::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      .list-scroll::-webkit-scrollbar-track,
      .detail-scroll::-webkit-scrollbar-track,
      .activity-scroll::-webkit-scrollbar-track,
      .repos-scroll::-webkit-scrollbar-track {
        background: var(--scroll-track);
        border-radius: 4px;
      }

      .list-scroll::-webkit-scrollbar-thumb,
      .detail-scroll::-webkit-scrollbar-thumb,
      .activity-scroll::-webkit-scrollbar-thumb,
      .repos-scroll::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 4px;
        border: 2px solid var(--scroll-track);
      }

      .list-scroll::-webkit-scrollbar-thumb:hover,
      .detail-scroll::-webkit-scrollbar-thumb:hover,
      .activity-scroll::-webkit-scrollbar-thumb:hover,
      .repos-scroll::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }

      .list-scroll::-webkit-scrollbar-thumb:active,
      .detail-scroll::-webkit-scrollbar-thumb:active,
      .activity-scroll::-webkit-scrollbar-thumb:active,
      .repos-scroll::-webkit-scrollbar-thumb:active {
        background: var(--scroll-thumb-active);
      }

      .list-scroll::-webkit-scrollbar-corner,
      .detail-scroll::-webkit-scrollbar-corner,
      .activity-scroll::-webkit-scrollbar-corner,
      .repos-scroll::-webkit-scrollbar-corner {
        background: var(--scroll-track);
      }

      /* ── Focus: accessible visible ring ── */
      :focus {
        outline: none;
      }

      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
        border-radius: 4px;
      }

      .tab:focus-visible {
        outline-offset: -2px;
        border-radius: 0;
      }

      .list-item:focus-visible {
        outline-offset: -2px;
        border-radius: 0;
      }

      /* ── Button pressed/active state ── */
      button.btn:active {
        transform: scale(0.97);
        background: var(--surface);
        border-color: var(--accent);
      }

      .modal button:first-of-type {
        border-radius: 0;
      }

      .modal button:last-of-type {
        border-radius: 0 0 10px 10px;
      }

      .modal button:hover {
        background: var(--raised);
      }

      .modal button:active {
        background: rgba(212, 155, 84, 0.08);
      }

      /* ── Table: zebra rows + hover ── */
      .repos-table tbody tr {
        transition: background 0.1s ease;
      }

      .repos-table tbody tr:nth-child(even) {
        background: rgba(30, 29, 27, 0.5);
      }

      .repos-table tbody tr:hover {
        background: rgba(212, 155, 84, 0.06);
      }

      .repos-table thead th {
        background: rgba(20, 19, 18, 0.6);
      }

      /* ── Activity line: hover highlight ── */
      .activity-line {
        transition: background 0.1s ease;
      }

      .activity-line:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      /* ── Find-card hover: subtle lift ── */
      .find-card:hover {
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
      }

      /* ── Brand dot: ambient pulse ── */
      .brand-dot {
        animation: brand-pulse 3s ease-in-out infinite;
      }

      /* ── Stream dot: pulse when live ── */
      .stream-live .stream-dot {
        animation: live-pulse 2s ease-in-out infinite;
      }

      /* ── Transcript: scrollbar + inset shadow ── */
      .transcript {
        scrollbar-width: thin;
        scrollbar-color: var(--scroll-thumb) var(--scroll-track);
        box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.15);
      }

      .transcript::-webkit-scrollbar {
        width: 6px;
      }

      .transcript::-webkit-scrollbar-track {
        background: var(--scroll-track);
      }

      .transcript::-webkit-scrollbar-thumb {
        background: var(--scroll-thumb);
        border-radius: 3px;
      }

      .transcript::-webkit-scrollbar-thumb:hover {
        background: var(--scroll-thumb-hover);
      }

      /* ── Detail head: subtle bottom gradient fade ── */
      .detail-head {
        background: linear-gradient(180deg, rgba(30, 29, 27, 0.3) 0%, transparent 100%);
      }

      /* ── Toolbar: subtle top surface ── */
      .toolbar {
        background: rgba(20, 19, 18, 0.4);
      }

      /* ── Keyframes ── */
      @keyframes flash-in {
        from {
          opacity: 0;
          transform: translateX(20px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }

      @keyframes modal-in {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes overlay-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes brand-pulse {
        0%, 100% {
          box-shadow: 0 0 16px rgba(212, 155, 84, 0.8);
        }
        50% {
          box-shadow: 0 0 8px rgba(212, 155, 84, 0.4);
        }
      }

      @keyframes live-pulse {
        0%, 100% {
          opacity: 1;
          box-shadow: 0 0 6px rgba(91, 175, 108, 0.7);
        }
        50% {
          opacity: 0.6;
          box-shadow: 0 0 2px rgba(91, 175, 108, 0.3);
        }
      }

      /* Strong global scrollbar override for visibility */
      html,
      body,
      .list-scroll,
      .detail-scroll,
      .activity-scroll,
      .repos-scroll,
      .transcript {
        scrollbar-width: auto;
        scrollbar-color: #9b7f59 #171513;
        scrollbar-gutter: stable;
      }

      *::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }

      *::-webkit-scrollbar-track {
        background: #171513;
      }

      *::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #b08d63 0%, #8f734f 100%);
        border: 2px solid #171513;
        border-radius: 999px;
      }

      *::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #c9a47a 0%, #a1845d 100%);
      }

      *::-webkit-scrollbar-thumb:active {
        background: linear-gradient(180deg, #d9b78e 0%, #b2946c 100%);
      }

      *::-webkit-scrollbar-corner {
        background: #171513;
      }

      /* ── Reduced motion: accessibility fallback ── */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import htm from 'https://esm.sh/htm@3.1.1';
      import { h, render } from 'https://esm.sh/preact@10.26.2';
      import { useEffect, useMemo, useRef, useState } from 'https://esm.sh/preact@10.26.2/hooks';

      const html = htm.bind(h);
      const MAX_EVENTS = 800;
      const AGENTS = [
        { key: null, label: 'Auto (default)' },
        { key: 'janitor', label: 'Janitor' },
        { key: 'hunter', label: 'Hunter' },
        { key: 'inspector', label: 'Inspector' },
        { key: 'scribe', label: 'Scribe' },
      ];

      const BADGE = {
        running: ['#5BAF6C', 'rgba(91,175,108,.14)'],
        succeeded: ['#5BAF6C', 'rgba(91,175,108,.14)'],
        failed: ['#E86A6A', 'rgba(232,106,106,.14)'],
        queued: ['#D49B54', 'rgba(212,155,84,.14)'],
        skipped: ['#9C9690', 'rgba(156,150,144,.14)'],
      };

      const SEV = { P0: '#E05252', P1: '#D98B3D', P2: '#C9A644', P3: '#4A9A8F' };

      const fmtClock = (ms) => new Date(ms).toLocaleTimeString();
      const fmtAgo = (ms) => {
        if (!ms) return '-';
        const d = Date.now() - ms;
        if (d < 60000) return Math.floor(d / 1000) + 's ago';
        if (d < 3600000) return Math.floor(d / 60000) + 'm ago';
        if (d < 86400000) return Math.floor(d / 3600000) + 'h ago';
        return Math.floor(d / 86400000) + 'd ago';
      };

      async function api(path, options) {
        const response = await fetch(path, {
          headers: { 'content-type': 'application/json' },
          ...options,
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data?.error?.message || 'Request failed');
        }
        return data;
      }

      function mergeEvents(previous, incoming) {
        if (!incoming || incoming.length === 0) return previous;
        const byId = new Map(previous.map((e) => [e.eventId, e]));
        for (const e of incoming) byId.set(e.eventId, e);
        const merged = [...byId.values()].sort((a, b) => a.eventId - b.eventId);
        return merged.length > MAX_EVENTS ? merged.slice(merged.length - MAX_EVENTS) : merged;
      }

      function severityDots(report) {
        const dots = [];
        for (let i = 0; i < report.p0Count; i += 1) dots.push('P0');
        for (let i = 0; i < report.p1Count; i += 1) dots.push('P1');
        for (let i = 0; i < report.p2Count; i += 1) dots.push('P2');
        for (let i = 0; i < report.p3Count; i += 1) dots.push('P3');
        return dots.slice(0, 18);
      }

      function App() {
        const [view, setView] = useState('reports');
        const [snapshot, setSnapshot] = useState(null);
        const [events, setEvents] = useState([]);
        const [latestSeq, setLatestSeq] = useState(0);
        const [streamState, setStreamState] = useState('connecting');
        const [selectedReportId, setSelectedReportId] = useState(null);
        const [selectedRepoId, setSelectedRepoId] = useState(null);
        const [detail, setDetail] = useState(null);
        const [detailMode, setDetailMode] = useState('findings');
        const [flash, setFlash] = useState(null);
        const [activityFilter, setActivityFilter] = useState('info+');
        const [pickerRepoId, setPickerRepoId] = useState(null);
        const [now, setNow] = useState(Date.now());
        const [historicalSession, setHistoricalSession] = useState([]);
        const [repoPickerOpen, setRepoPickerOpen] = useState(false);
        const [repoQuery, setRepoQuery] = useState('');
        const [repoHighlight, setRepoHighlight] = useState(0);
        const reconnectRef = useRef(500);
        const latestSeqRef = useRef(0);
        const repoPickerRef = useRef(null);
        const repoInputRef = useRef(null);

        const showFlash = (message, tone = 'info') => {
          setFlash({ message, tone });
          setTimeout(() => setFlash(null), 2400);
        };

        const refreshSnapshot = async () => {
          const data = await api('/v1/dashboard/snapshot?eventsLimit=120&reportsLimit=60');
          setSnapshot(data);
          setEvents((prev) => mergeEvents(prev, data.events));
          setLatestSeq((seq) => { const next = Math.max(seq, data.latestSeq); latestSeqRef.current = next; return next; });
          setSelectedReportId((id) => id ?? data.reports?.[0]?.id ?? null);
        };

        useEffect(() => {
          let stop = false;
          refreshSnapshot().catch((error) => {
            showFlash(error.message || String(error), 'error');
          });
          const tick = setInterval(() => setNow(Date.now()), 1000);
          const refresh = setInterval(() => {
            refreshSnapshot().catch(() => {});
          }, 4000);

          const connect = () => {
            if (stop) return;
            setStreamState('connecting');
            const stream = new EventSource(`/v1/events/stream?afterSeq=${latestSeqRef.current}`);

            stream.addEventListener('ready', (event) => {
              setStreamState('live');
              reconnectRef.current = 500;
              const payload = JSON.parse(event.data);
              if (typeof payload.afterSeq === 'number') setLatestSeq((s) => { const next = Math.max(s, payload.afterSeq); latestSeqRef.current = next; return next; });
            });

            stream.addEventListener('heartbeat', () => {
              setStreamState('live');
            });

            stream.addEventListener('event', (event) => {
              setStreamState('live');
              const payload = JSON.parse(event.data);
              setLatestSeq((s) => { const next = Math.max(s, payload.eventId || 0); latestSeqRef.current = next; return next; });
              setEvents((prev) => mergeEvents(prev, [payload]));
            });

            stream.onerror = () => {
              stream.close();
              if (stop) return;
              setStreamState('error');
              const delay = reconnectRef.current;
              reconnectRef.current = Math.min(5000, reconnectRef.current * 2);
              setTimeout(connect, delay);
            };
          };

          connect();

          return () => {
            stop = true;
            clearInterval(tick);
            clearInterval(refresh);
          };
        }, []);

        const reports = snapshot?.reports ?? [];
        const repos = snapshot?.repos ?? [];
        const daemon = snapshot?.daemon;
        const filteredReports = selectedRepoId
          ? reports.filter((r) => r.repoId === selectedRepoId)
          : reports;
        const selectedReport =
          filteredReports.find((r) => r.id === selectedReportId) ??
          filteredReports[0] ??
          null;
        const selectedRepo = repos.find((r) => r.id === selectedRepoId) ?? repos[0] ?? null;
        const repoOptions = repos.filter((repo) => {
          if (!repoQuery.trim()) return true;
          const needle = repoQuery.trim().toLowerCase();
          return (
            (repo.path || '').toLowerCase().includes(needle) ||
            (repo.defaultBranch || '').toLowerCase().includes(needle)
          );
        });

        useEffect(() => {
          if (repos.length === 0) return;
          const persisted = localStorage.getItem('dashboard.selectedRepoId');
          if (persisted && repos.some((repo) => repo.id === persisted)) {
            setSelectedRepoId((current) => current ?? persisted);
            return;
          }
          setSelectedRepoId((current) => current ?? repos[0].id);
        }, [repos]);

        useEffect(() => {
          if (!selectedRepoId) return;
          localStorage.setItem('dashboard.selectedRepoId', selectedRepoId);
        }, [selectedRepoId]);

        useEffect(() => {
          if (!selectedRepoId) return;
          if (!repos.some((repo) => repo.id === selectedRepoId)) {
            setSelectedRepoId(repos[0]?.id ?? null);
          }
        }, [repos, selectedRepoId]);

        useEffect(() => {
          if (!selectedRepoId) return;
          if (
            filteredReports.length > 0 &&
            !filteredReports.some((report) => report.id === selectedReportId)
          ) {
            setSelectedReportId(filteredReports[0].id);
          }
          if (filteredReports.length === 0) {
            setSelectedReportId(null);
            setDetail(null);
          }
        }, [selectedRepoId, filteredReports, selectedReportId]);

        useEffect(() => {
          if (!repoPickerOpen) return;
          requestAnimationFrame(() => repoInputRef.current?.focus());
        }, [repoPickerOpen]);

        useEffect(() => {
          if (!repoPickerOpen) return;
          const onMouseDown = (event) => {
            if (!repoPickerRef.current?.contains(event.target)) {
              setRepoPickerOpen(false);
            }
          };
          document.addEventListener('mousedown', onMouseDown);
          return () => {
            document.removeEventListener('mousedown', onMouseDown);
          };
        }, [repoPickerOpen]);

        useEffect(() => {
          if (!selectedReport) {
            setDetail(null);
            return;
          }
          api(`/v1/dashboard/report?agentRunId=${encodeURIComponent(selectedReport.id)}&findingsLimit=300`)
            .then((data) => setDetail(data))
            .catch((error) => showFlash(error.message || String(error), 'error'));
        }, [selectedReportId, reports.length]);

        useEffect(() => {
          if (!selectedReport || detailMode !== 'session') return;
          const running = selectedReport.status === 'running' || selectedReport.status === 'queued';
          if (running) {
            setHistoricalSession([]);
            return;
          }
          api(`/v1/events?afterSeq=0&limit=500&agentRunId=${encodeURIComponent(selectedReport.id)}`)
            .then((data) => setHistoricalSession(data.events || []))
            .catch(() => setHistoricalSession([]));
        }, [selectedReportId, detailMode]);

        const sessionEvents = useMemo(() => {
          if (!selectedReport) return [];
          const inMemory = events.filter((e) => e.topic?.startsWith('session.') && (e.agentRunId === selectedReport.id || (selectedReport.sessionId && e.sessionId === selectedReport.sessionId)));
          return inMemory.length > 0 ? inMemory : historicalSession;
        }, [events, selectedReport, historicalSession]);

        const transcript = useMemo(() => {
          const lines = [];
          for (const ev of sessionEvents) {
            if (ev.topic === 'session.delta') {
              lines.push(typeof ev.payload?.delta === 'string' ? ev.payload.delta : ev.message || '');
            } else if (String(ev.topic || '').startsWith('session.')) {
              lines.push(`\n--- ${String(ev.topic).replace('session.', '').toUpperCase()}: ${ev.message || ''} ---\n`);
            }
          }
          return lines.join('');
        }, [sessionEvents]);

        const triggerReview = async (repoId, agent) => {
          try {
            await api('/v1/reviews/enqueue', {
              method: 'POST',
              body: JSON.stringify({ repoOrId: repoId, agent: agent || undefined }),
            });
            showFlash(`Review enqueued${agent ? ` (${agent})` : ''}`);
            refreshSnapshot().catch(() => {});
          } catch (error) {
            showFlash(error.message || String(error), 'error');
          }
        };

        const deleteReport = async () => {
          if (!selectedReport) return;
          try {
            await api('/v1/dashboard/report', {
              method: 'DELETE',
              body: JSON.stringify({ agentRunId: selectedReport.id }),
            });
            showFlash('Report deleted');
            setSelectedReportId(null);
            setDetail(null);
            refreshSnapshot().catch(() => {});
          } catch (error) {
            showFlash(error.message || String(error), 'error');
          }
        };

        const clearActivityLog = () => {
          setEvents([]);
          setLatestSeq(0);
          showFlash('Activity log cleared');
        };

        const selectRepo = (repoId) => {
          setSelectedRepoId(repoId);
          setRepoPickerOpen(false);
          setRepoQuery('');
          setRepoHighlight(0);
        };

        const onRepoQueryKeyDown = (event) => {
          if (event.key === 'Escape') {
            event.preventDefault();
            setRepoPickerOpen(false);
            return;
          }
          if (repoOptions.length === 0) return;
          if (event.key === 'ArrowDown') {
            event.preventDefault();
            setRepoHighlight((index) => (index + 1) % repoOptions.length);
          } else if (event.key === 'ArrowUp') {
            event.preventDefault();
            setRepoHighlight(
              (index) => (index - 1 + repoOptions.length) % repoOptions.length,
            );
          } else if (event.key === 'Enter') {
            event.preventDefault();
            selectRepo(repoOptions[repoHighlight].id);
          }
        };

        const runningJobs = repos.reduce((sum, repo) => sum + (repo.runningJobs || 0), 0);
        const queuedJobs = repos.reduce((sum, repo) => sum + (repo.queuedJobs || 0), 0);

        const minLevel = activityFilter === 'all' ? 0 : activityFilter === 'info+' ? 1 : activityFilter === 'warn+' ? 2 : 3;
        const rank = { debug: 0, info: 1, warn: 2, error: 3 };
        const filteredActivity = events.filter((e) => (rank[e.level] ?? 0) >= minLevel).slice().reverse();

        return html`
          <div id="root">
            <header class="header">
              <div class="header-left">
                <div class="brand"><span class="brand-dot"></span>opencode-janitor</div>
                <div class="repo-select" ref=${repoPickerRef}>
                  <button
                    class="repo-pill"
                    aria-label="Select repository"
                    aria-expanded=${repoPickerOpen ? 'true' : 'false'}
                    onClick=${() => {
                      setRepoPickerOpen((open) => !open);
                      setRepoHighlight(0);
                    }}
                  >
                    <span class="repo-pill-text">${selectedRepo?.path || 'Select repository'}</span>
                    <span class="repo-chevron">v</span>
                  </button>
                  ${repoPickerOpen && html`
                    <div class="repo-dropdown">
                      <input
                        class="repo-search"
                        ref=${repoInputRef}
                        value=${repoQuery}
                        placeholder="Filter repos by path or branch"
                        onInput=${(event) => {
                          setRepoQuery(event.target.value);
                          setRepoHighlight(0);
                        }}
                        onKeyDown=${onRepoQueryKeyDown}
                      />
                      <div class="repo-options">
                        ${repoOptions.length === 0 && html`<div class="repo-empty">No repos match.</div>`}
                        ${repoOptions.map((repo, index) => html`
                          <button
                            class=${`repo-option ${index === repoHighlight ? 'active' : ''}`}
                            onMouseEnter=${() => setRepoHighlight(index)}
                            onClick=${() => selectRepo(repo.id)}
                          >
                            <span class="path">${repo.path}</span>
                            <span class="meta">${repo.defaultBranch} · ${repo.runningJobs} running / ${repo.queuedJobs} queued</span>
                          </button>
                        `)}
                      </div>
                    </div>
                  `}
                </div>
                <button
                  class="btn"
                  onClick=${() => setPickerRepoId(selectedRepo?.id || null)}
                  ?disabled=${!selectedRepo}
                >
                  Run Review
                </button>
              </div>
              <div class="stats">
                <span>uptime <span class="stat-value">${daemon ? Math.floor(daemon.uptimeMs / 60000) + 'm' : '-'}</span></span>
                <span>repos <span class="stat-value">${repos.length}</span></span>
                <span>running <span class="stat-value">${runningJobs}</span></span>
                <span>queued <span class="stat-value">${queuedJobs}</span></span>
              </div>
              <div class=${`stream stream-${streamState}`}>
                <span class="stream-dot"></span>
                <span>${streamState.toUpperCase()}</span>
              </div>
            </header>

            <nav class="tabs">
              <button class=${`tab ${view === 'reports' ? 'active' : ''}`} onClick=${() => setView('reports')}>Reports</button>
              <button class=${`tab ${view === 'activity' ? 'active' : ''}`} onClick=${() => setView('activity')}>Activity</button>
            </nav>

            <main class="content">
              ${view === 'reports' && html`
                <section class="reports-meta">
                  <div class="meta-grid">
                    <div class="meta-item">
                      <div class="label">Path</div>
                      <div class="value">${selectedRepo?.path || '-'}</div>
                    </div>
                    <div class="meta-item">
                      <div class="label">State</div>
                      <div class="value">${selectedRepo ? (!selectedRepo.enabled ? 'disabled' : selectedRepo.paused ? 'paused' : selectedRepo.runningJobs > 0 ? 'running' : selectedRepo.queuedJobs > 0 ? 'queued' : selectedRepo.idleStreak > 0 ? 'idle' : 'watching') : '-'}</div>
                    </div>
                    <div class="meta-item">
                      <div class="label">Branch</div>
                      <div class="value">${selectedRepo?.defaultBranch || '-'}</div>
                    </div>
                    <div class="meta-item">
                      <div class="label">Jobs</div>
                      <div class="value">${selectedRepo ? `${selectedRepo.runningJobs} running / ${selectedRepo.queuedJobs} queued` : '-'}</div>
                    </div>
                    <div class="meta-item">
                      <div class="label">Next Check</div>
                      <div class="value">${selectedRepo ? `c:${fmtAgo(selectedRepo.nextCommitCheckAt)} | pr:${fmtAgo(selectedRepo.nextPrCheckAt)}` : '-'}</div>
                    </div>
                  </div>
                </section>
                <section class="reports-layout">
                  <div class="panel list-scroll">
                    ${filteredReports.length === 0 && html`<div class="list-item muted">No reports yet for this repo.</div>`}
                    ${filteredReports.map((report) => {
                      const [fg, bg] = BADGE[report.status] || ['#9c9690', 'rgba(156,150,144,.12)'];
                      const dots = severityDots(report);
                      return html`
                        <div class=${`list-item ${selectedReport?.id === report.id ? 'active' : ''}`} onClick=${() => setSelectedReportId(report.id)}>
                          <div class="row">
                            <strong>${report.agent}</strong>
                            <span class="badge" style=${`color:${fg};background:${bg};border-color:${fg}44`}>${report.status}</span>
                          </div>
                          <div class="row muted" style="margin-top:4px; font-size:12px;">
                            <span>${(report.repoPath || '').split('/').pop()}</span>
                            <span class="mono">${fmtAgo(report.finishedAt || report.startedAt || 0)}</span>
                          </div>
                          <div class="severity" style="margin-top:8px;" title=${`P0 ${report.p0Count} / P1 ${report.p1Count} / P2 ${report.p2Count} / P3 ${report.p3Count}`}>
                            ${dots.map((sev) => html`<span class="sev-dot" style=${`background:${SEV[sev]};`}></span>`)}
                            ${report.findingsCount > dots.length && html`<span class="subtle mono" style="font-size:11px;">+${report.findingsCount - dots.length}</span>`}
                          </div>
                        </div>
                      `;
                    })}
                  </div>

                  <div class="panel">
                    ${selectedReport && detail && html`
                      <div class="detail-head">
                        <div>
                          <div><strong>${selectedReport.agent}</strong> · <span class="mono">${(selectedReport.repoPath || '').split('/').pop()}</span></div>
                          <div class="muted" style="font-size:11px; margin-top:4px;">${selectedReport.errorMessage || 'Session ' + (selectedReport.sessionId || '-')}</div>
                        </div>
                        <div class="detail-actions">
                          <button class="btn" onClick=${() => setDetailMode(detailMode === 'findings' ? 'session' : 'findings')}>${detailMode === 'findings' ? 'Session' : 'Findings'}</button>
                          <button class="btn" onClick=${deleteReport}>Delete</button>
                        </div>
                      </div>
                      <div class="detail-scroll">
                        ${detailMode === 'findings' && html`
                          ${detail.findings.length === 0 && html`<div class="find-card subtle">No findings for this report.</div>`}
                          ${detail.findings.map((f) => html`
                            <article class="find-card" style=${`border-left-color:${SEV[f.severity] || '#9c9690'};`}>
                              <div class="row">
                                <strong style=${`color:${SEV[f.severity] || '#9c9690'};`}>${f.severity} · ${f.domain}</strong>
                                <span class="mono subtle">${fmtClock(f.createdAt)}</span>
                              </div>
                              <p style="margin:8px 0 6px;">${f.evidence}</p>
                              <div class="mono" style="font-size:10px; color:var(--accent);">${f.location}</div>
                              <p class="muted" style="margin:8px 0 0;">${f.prescription}</p>
                            </article>
                          `)}
                        `}
                        ${detailMode === 'session' && html`
                          <pre class="transcript">${transcript || 'No session transcript available yet.'}</pre>
                        `}
                      </div>
                    `}
                    ${(!selectedReport || !detail) && html`<div class="detail-head muted">Select a report to view details.</div>`}
                  </div>
                </section>
              `}

              ${view === 'activity' && html`
                <section class="panel activity-window">
                  <div class="toolbar">
                    <strong>Activity Log</strong>
                    <div class="detail-actions">
                      <button class="btn btn-danger" onClick=${clearActivityLog}>Clear</button>
                      <button class="btn" onClick=${() => setActivityFilter('all')}>All</button>
                      <button class="btn" onClick=${() => setActivityFilter('info+')}>Info+</button>
                      <button class="btn" onClick=${() => setActivityFilter('warn+')}>Warn+</button>
                      <button class="btn" onClick=${() => setActivityFilter('error')}>Error</button>
                    </div>
                  </div>
                  <div class="activity-scroll">
                    ${filteredActivity.length === 0 && html`<div class="activity-line muted">No activity events yet.</div>`}
                    ${filteredActivity.map((ev) => {
                      const color = ev.level === 'error' ? 'var(--error)' : ev.level === 'warn' ? 'var(--warn)' : ev.level === 'info' ? '#6FA0BE' : 'var(--text-tertiary)';
                      return html`
                        <div class="activity-line">
                          <span style=${`color:${color};`}>${String(ev.level).toUpperCase().padEnd(5)}</span>
                          <span class="subtle"> ${fmtClock(ev.ts)} </span>
                          <span style="color:var(--accent)">${ev.topic}</span>
                          <span class="muted"> ${ev.message}</span>
                        </div>
                      `;
                    })}
                  </div>
                </section>
              `}
            </main>

            ${flash && html`
              <div class="flash" style=${flash.tone === 'error' ? 'border-left-color:var(--error);' : flash.tone === 'warn' ? 'border-left-color:var(--warn);' : 'border-left-color:var(--accent);'}>
                ${flash.message}
              </div>
            `}

            ${pickerRepoId && html`
              <div class="overlay" onClick=${() => setPickerRepoId(null)}>
                <div class="modal" onClick=${(e) => e.stopPropagation()}>
                  <div style="padding:12px 12px 8px;"><strong>Trigger Manual Review</strong><div class="muted" style="font-size:12px; margin-top:4px;">Choose an agent</div></div>
                  ${AGENTS.map((agent) => html`
                    <button onClick=${() => {
                      triggerReview(pickerRepoId, agent.key);
                      setPickerRepoId(null);
                    }}>
                      ${agent.label}
                    </button>
                  `)}
                </div>
              </div>
            `}
          </div>
        `;
      }

      render(html`<${App} />`, document.getElementById('app'));
    </script>
  </body>
</html>
